<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- The 2nd Summit favicon: night topographic field with a mountain peak -->
  <rect width="32" height="32" rx="6" fill="#101c19"/>
  <!-- Mountain ridge: two peaks, the higher being the "2nd summit" -->
  <path d="M3 25 L11 14 L15 19 L20 9 L29 25 Z" fill="#16241f" stroke="#e9ede9" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- Contour line tracing the slope, decorative -->
  <path d="M6 25 L11 18 L14 21" fill="none" stroke="#3a5247" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Summit marker on the higher peak -->
  <circle cx="20" cy="9" r="2.3" fill="#ff6a3d"/>
</svg>
